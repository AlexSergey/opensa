<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSA Viewer</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: monospace;
      }
      /* Tab nav — top-centre so it never overlaps the viewers' top-left .panel. */
      .viewer-tabs {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        padding: 4px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 6px;
        z-index: 10;
      }
      .viewer-tabs a {
        padding: 4px 10px;
        color: #ccc;
        text-decoration: none;
        border-radius: 4px;
        font-size: 13px;
      }
      .viewer-tabs a.active {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
      }
      .panel {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #eee;
        border-radius: 6px;
        font-size: 13px;
        width: 220px;
      }
      .panel select,
      .panel button {
        font-family: monospace;
        font-size: 13px;
        padding: 4px 6px;
      }
      .panel button {
        cursor: pointer;
      }
      .panel label {
        cursor: pointer;
        user-select: none;
      }
      .panel hr {
        width: 100%;
        border: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        margin: 2px 0;
      }
      /* Object-viewer multi-select list (overlay several models to compare) — scrolls within the panel. */
      .model-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        max-height: 30vh;
        overflow-y: auto;
      }
      .list-title {
        font-weight: bold;
        opacity: 0.85;
        margin-top: 2px;
      }
      .hint {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <nav class="viewer-tabs">
      <a href="?tab=object" data-tab="object">Object</a>
      <a href="?tab=vehicle" data-tab="vehicle">Vehicle</a>
      <a href="?tab=character" data-tab="character">Character</a>
    </nav>
    <script type="module" src="/apps/viewer/src/shell.ts"></script>
  </body>
</html>
