name: CI

on:
  push:
  pull_request:

# One run per ref; a new push cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run lint # tsc --noEmit + eslint
      - run: npm test # vitest run

  e2e:
    name: E2E (CI-viable specs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # .env is gitignored, so CI has no VITE_STATIC_URL — the dev server would bake it as undefined and the
      # viewers would fetch the SPA index.html instead of their dff/txd. Point it at the local static origin.
      - run: echo "VITE_STATIC_URL=http://localhost:3001" > .env
      # Only the specs that don't need the gitignored game archives:
      #  - asset-loader: mocks all network (page.route).
      #  - object-viewer: loads from the committed static-viewer/ (served by serve:static).
      # shell.spec's happy path needs static/<game>-<version>/ → not run here.
      # --ignore-snapshots: the visual baseline is platform-bound (…-darwin.png); the functional
      # checks (render smoke, model switch) still run. Pixel comparison stays a local concern.
      - run: npx playwright test asset-loader object-viewer --ignore-snapshots
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
